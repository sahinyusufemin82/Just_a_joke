<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Cartoon Slap Mobile</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at 20% 20%, #ffb347, #ff6f61, #c471ed);
    font-family: 'Segoe UI', sans-serif;
    overflow:hidden;
}

/* CAM PANEL */
.scene{
    position:relative;
    width:90vw;
    max-width:450px;
    height:90vh;
    max-height:600px;
    backdrop-filter: blur(25px);
    background:rgba(255,255,255,0.08);
    border-radius:5vw;
    box-shadow:0 5vw 10vw rgba(0,0,0,0.4);
    overflow:hidden;
    padding-top:2vh;
}

/* COUNTER */
.counter{
    text-align:center;
    color:white;
    font-size:4vw;
    letter-spacing:0.2vw;
    text-shadow:0 0 2vw black;
}

/* GIRL */
.girl{
    position:absolute;
    bottom:18%;
    left:50%;
    transform:translateX(-50%);
    transition:0.2s;
    z-index:5;
}

/* SAÇ (UZUN TURUNCU) */
.hair{
    position:absolute;
    width:60vw;
    max-width:260px;
    height:80vw;
    max-height:320px;
    background:linear-gradient(180deg,#ffb347,#ff7a00,#ff3c00);
    border-radius:140px 140px 100px 100px;
    top:-30vw;
    left:-10vw;
    z-index:-1;
    box-shadow:
        inset 0 5vw 10vw rgba(255,255,255,0.3),
        0 5vw 10vw rgba(0,0,0,0.4);
}

/* YÜZ */
.face{
    width:45vw;
    max-width:190px;
    height:55vw;
    max-height:230px;
    background:radial-gradient(circle at 50% 40%, #fff5ec 60%, #ffd8c2);
    border-radius:120px;
    position:relative;
    box-shadow:
        inset 0 -3vw 5vw rgba(0,0,0,0.1),
        0 5vw 10vw rgba(0,0,0,0.3);
    border:0.5vw solid rgba(0,0,0,0.2);
}

/* GÖZ */
.eye{
    width:9vw;
    max-width:36px;
    height:9vw;
    max-height:36px;
    background:radial-gradient(circle at 40% 40%, #b08968, #5e3b22);
    border-radius:50%;
    position:absolute;
    top:23%;
    box-shadow: inset 0 1.5vw 2.5vw rgba(0,0,0,0.4);
}

.eye::after{
    content:"";
    width:3vw;
    height:3vw;
    max-width:12px;
    max-height:12px;
    background:white;
    border-radius:50%;
    position:absolute;
    top:1.5vw;
    left:2vw;
}

.left-eye{left:12%;}
.right-eye{right:12%;}

/* ÇİLLER */
.freckle{
    width:2vw;
    height:2vw;
    max-width:7px;
    max-height:7px;
    background:#d99a6c;
    border-radius:50%;
    position:absolute;
    opacity:0.8;
}
.f1{top:36%; left:15%;}
.f2{top:37%; left:20%;}
.f3{top:36%; right:15%;}
.f4{top:37%; right:20%;}

/* AĞIZ */
.mouth{
    position:absolute;
    width:12vw;
    max-width:50px;
    height:6vw;
    max-height:25px;
    border-bottom:0.8vw solid #b56576;
    border-radius:50%;
    bottom:8%;
    left:50%;
    transform:translateX(-50%);
}

/* EL */
.hand{
    position:absolute;
    width:35vw;
    max-width:160px;
    height:25vw;
    max-height:110px;
    background:radial-gradient(circle at 40% 40%, #ffd6b3, #f4a261);
    border-radius:15vw;
    right:-50%;
    top:40%;
    transition:0.15s ease;
    box-shadow:0 3vw 10vw rgba(0,0,0,0.4);
    z-index:10;
}

/* BUTON */
.btn{
    position:absolute;
    bottom:3%;
    left:50%;
    transform:translateX(-50%);
    padding:3vw 8vw;
    font-size:4vw;
    font-weight:bold;
    letter-spacing:0.2vw;
    border:none;
    border-radius:10vw;
    cursor:pointer;
    background:linear-gradient(45deg,#ff3c00,#ff8500);
    color:white;
    box-shadow:0 2vw 5vw rgba(0,0,0,0.4);
    transition:0.2s;
}

.btn:hover{
    transform:translateX(-50%) scale(1.05);
}

/* SHAKE */
@keyframes shake{
    0%{transform:translateX(-50%);}
    25%{transform:translateX(-55%);}
    50%{transform:translateX(-45%);}
    75%{transform:translateX(-52%);}
    100%{transform:translateX(-50%);}
}

.shake{
    animation:shake 0.3s;
}

/* IMPACT TEXT */
.impact{
    position:absolute;
    top:30%;
    left:50%;
    transform:translateX(-50%) scale(0);
    font-size:10vw;
    font-weight:bold;
    color:white;
    text-shadow:0 0 5vw red;
    transition:0.2s;
    z-index:15;
}

.impact.show{
    transform:translateX(-50%) scale(1.3);
}

/* FINAL */
.final{
    position:absolute;
    top:35%;
    width:100%;
    text-align:center;
    font-size:8vw;
    font-weight:900;
    letter-spacing:0.3vw;
    color:white;
    opacity:0;
    transform:scale(0.5);
    transition:0.6s;
    text-shadow:0 0 2vw #fff, 0 0 4vw #ff3c00, 0 0 8vw #ff0000;
    z-index:20;
}

.final.show{
    opacity:1;
    transform:scale(1.2);
    animation:pulse 1s infinite alternate;
}

@keyframes pulse{
    from{
        transform:scale(1.2);
        text-shadow:0 0 2vw #fff,0 0 4vw #ff3c00,0 0 8vw #ff0000;
    }
    to{
        transform:scale(1.35);
        text-shadow:0 0 3vw #fff,0 0 6vw #ff3c00,0 0 12vw #ff0000;
    }
}
</style>
</head>
<body>

<div class="scene">

<div class="counter" id="counter">HITS 0 / 7</div>

<div class="impact" id="impact">POW!</div>

<div class="final" id="final">GO WASH THE DISHES</div>

<div class="girl" id="girl">
    <div class="face">
        <div class="hair"></div>
        <div class="eye left-eye"></div>
        <div class="eye right-eye"></div>
        <div class="freckle f1"></div>
        <div class="freckle f2"></div>
        <div class="freckle f3"></div>
        <div class="freckle f4"></div>
        <div class="mouth"></div>
    </div>
</div>

<div class="hand" id="hand"></div>

<button class="btn" id="btn">TOKAT</button>

</div>

<script>
let count=0;

const btn=document.getElementById("btn");
const hand=document.getElementById("hand");
const girl=document.getElementById("girl");
const impact=document.getElementById("impact");
const counter=document.getElementById("counter");
const final=document.getElementById("final");

btn.addEventListener("click",()=>{

if(count>=7)return;

count++;
counter.innerText="HITS "+count+" / 7";

hand.style.right="-20%";
setTimeout(()=>hand.style.right="-50%",150);

girl.classList.add("shake");
impact.classList.add("show");

setTimeout(()=>{
girl.classList.remove("shake");
impact.classList.remove("show");
},300);

if(count===7){
setTimeout(()=>final.classList.add("show"),500);
}

});
</script>

</body>
</html>
