<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Cartoon Slap Game</title>
<style>
body{
    margin:0;
    background:linear-gradient(135deg,#ff9ec4,#ffc3a0);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

.scene{
    position:relative;
    width:420px;
    height:550px;
}

/* COUNTER */
.counter{
    position:absolute;
    top:10px;
    left:10px;
    font-size:22px;
    font-weight:bold;
    color:white;
    text-shadow:0 0 10px black;
}

/* GIRL */
.girl{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    transition:0.2s;
}

.face{
    width:170px;
    height:190px;
    background:#fff1e6;
    border-radius:100px;
    border:4px solid #222;
    position:relative;
    overflow:hidden;
}

/* Hair */
.hair{
    position:absolute;
    width:200px;
    height:140px;
    background:linear-gradient(#ffe066,#ffb703);
    border-radius:120px 120px 0 0;
    top:-60px;
    left:-15px;
}

/* Eyes */
.eye{
    width:28px;
    height:28px;
    background:#6b4f2a;
    border-radius:50%;
    position:absolute;
    top:70px;
}

.left-eye{left:40px;}
.right-eye{right:40px;}

/* Freckles */
.freckle{
    width:6px;
    height:6px;
    background:#d89c7a;
    border-radius:50%;
    position:absolute;
}
.f1{top:110px; left:50px;}
.f2{top:115px; left:65px;}
.f3{top:110px; right:50px;}
.f4{top:115px; right:65px;}

/* HAND */
.hand{
    position:absolute;
    width:140px;
    height:90px;
    background:#ffd6b3;
    border-radius:50px;
    right:-180px;
    top:180px;
    cursor:pointer;
    transition:0.12s;
}

/* SHAKE */
@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-15px);}
    50%{transform:translateX(15px);}
    75%{transform:translateX(-10px);}
    100%{transform:translateX(0);}
}

.shake{
    animation:shake 0.3s;
}

/* SCREEN SHAKE */
@keyframes screenShake{
    0%{transform:translate(0);}
    25%{transform:translate(-5px,5px);}
    50%{transform:translate(5px,-5px);}
    75%{transform:translate(-5px,-5px);}
    100%{transform:translate(0);}
}

.screenShake{
    animation:screenShake 0.3s;
}

/* IMPACT TEXT */
.impact{
    position:absolute;
    top:120px;
    left:50%;
    transform:translateX(-50%) scale(0);
    font-size:40px;
    font-weight:bold;
    color:white;
    text-shadow:0 0 20px red;
    transition:0.2s;
}

.impact.show{
    transform:translateX(-50%) scale(1.2);
}

/* FINAL MESSAGE */
.final{
    position:absolute;
    top:30%;
    width:100%;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:white;
    opacity:0;
    transform:scale(0);
    transition:0.6s;
    text-shadow:0 0 20px black;
}

.final.show{
    opacity:1;
    transform:scale(1.2);
}

/* DISH ITEMS */
.items{
    position:absolute;
    bottom:-150px;
    width:100%;
    text-align:center;
    font-size:50px;
    transition:1s;
}

.items.show{
    bottom:20px;
}
</style>
</head>
<body>

<div class="scene" id="scene">

<div class="counter" id="counter">Hits: 0 / 7</div>

<div class="impact" id="impact">POW!</div>

<div class="final" id="final">
LEVEL COMPLETE <br> CLEAN MODE ACTIVATED 🧼
</div>

<div class="girl" id="girl">
    <div class="face">
        <div class="hair"></div>
        <div class="eye left-eye"></div>
        <div class="eye right-eye"></div>
        <div class="freckle f1"></div>
        <div class="freckle f2"></div>
        <div class="freckle f3"></div>
        <div class="freckle f4"></div>
    </div>
</div>

<div class="hand" id="hand"></div>

<div class="items" id="items">
🧽 🍽️ 🫧 🧼
</div>

</div>

<script>
let count = 0;

const hand = document.getElementById("hand");
const girl = document.getElementById("girl");
const counter = document.getElementById("counter");
const impact = document.getElementById("impact");
const finalMsg = document.getElementById("final");
const items = document.getElementById("items");
const scene = document.getElementById("scene");

hand.addEventListener("click", ()=>{

    if(count >= 7) return;

    count++;
    counter.innerText = "Hits: " + count + " / 7";

    // Hand animation
    hand.style.right = "-60px";
    setTimeout(()=> hand.style.right = "-180px",120);

    // Girl shake
    girl.classList.add("shake");
    scene.classList.add("screenShake");

    impact.classList.add("show");

    setTimeout(()=>{
        girl.classList.remove("shake");
        scene.classList.remove("screenShake");
        impact.classList.remove("show");
    },300);

    if(count === 7){
        setTimeout(()=>{
            finalMsg.classList.add("show");
            items.classList.add("show");
        },600);
    }
});
</script>

</body>
</html>
