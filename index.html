<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Premium Cartoon Slap</title>
<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at 20% 20%, #ffb347, #ff6f61, #c471ed);
    font-family: 'Segoe UI', sans-serif;
    overflow:hidden;
}

/* CAM PANEL */
.scene{
    position:relative;
    width:450px;
    height:600px;
    backdrop-filter: blur(25px);
    background:rgba(255,255,255,0.08);
    border-radius:35px;
    box-shadow:0 30px 80px rgba(0,0,0,0.4);
    overflow:hidden;
    padding-top:20px;
}

/* COUNTER */
.counter{
    text-align:center;
    color:white;
    font-size:20px;
    letter-spacing:3px;
    text-shadow:0 0 10px black;
}

/* GIRL */
.girl{
    position:absolute;
    bottom:110px;
    left:50%;
    transform:translateX(-50%);
    transition:0.2s;
}

/* SAÇ (UZUN TURUNCU) */
.hair{
    position:absolute;
    width:260px;
    height:320px;
    background:linear-gradient(180deg,#ffb347,#ff7a00,#ff3c00);
    border-radius:140px 140px 100px 100px;
    top:-120px;
    left:-40px;
    z-index:-1;
    box-shadow:
        inset 0 20px 40px rgba(255,255,255,0.3),
        0 25px 50px rgba(0,0,0,0.4);
}

/* YÜZ */
.face{
    width:190px;
    height:230px;
    background:radial-gradient(circle at 50% 40%, #fff5ec 60%, #ffd8c2);
    border-radius:120px;
    position:relative;
    box-shadow:
        inset 0 -15px 25px rgba(0,0,0,0.1),
        0 25px 45px rgba(0,0,0,0.3);
    border:3px solid rgba(0,0,0,0.2);
}

/* GÖZ */
.eye{
    width:36px;
    height:36px;
    background:radial-gradient(circle at 40% 40%, #b08968, #5e3b22);
    border-radius:50%;
    position:absolute;
    top:90px;
    box-shadow: inset 0 6px 10px rgba(0,0,0,0.4);
}

.eye::after{
    content:"";
    width:12px;
    height:12px;
    background:white;
    border-radius:50%;
    position:absolute;
    top:6px;
    left:8px;
}

.left-eye{left:50px;}
.right-eye{right:50px;}

/* ÇİLLER */
.freckle{
    width:7px;
    height:7px;
    background:#d99a6c;
    border-radius:50%;
    position:absolute;
    opacity:0.8;
}
.f1{top:140px; left:65px;}
.f2{top:145px; left:80px;}
.f3{top:140px; right:65px;}
.f4{top:145px; right:80px;}

/* AĞIZ */
.mouth{
    position:absolute;
    width:50px;
    height:25px;
    border-bottom:4px solid #b56576;
    border-radius:50%;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
}

/* EL */
.hand{
    position:absolute;
    width:160px;
    height:110px;
    background:radial-gradient(circle at 40% 40%, #ffd6b3, #f4a261);
    border-radius:60px;
    right:-220px;
    top:240px;
    transition:0.15s ease;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

/* BUTON */
.btn{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    padding:15px 40px;
    border:none;
    border-radius:30px;
    font-size:18px;
    letter-spacing:2px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(45deg,#ff3c00,#ff8500);
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:0.2s;
}

.btn:hover{
    transform:translateX(-50%) scale(1.1);
}

/* SHAKE */
@keyframes shake{
    0%{transform:translateX(-50%);}
    25%{transform:translateX(-65%);}
    50%{transform:translateX(-35%);}
    75%{transform:translateX(-55%);}
    100%{transform:translateX(-50%);}
}

.shake{
    animation:shake 0.3s;
}

/* IMPACT TEXT */
.impact{
    position:absolute;
    top:180px;
    left:50%;
    transform:translateX(-50%) scale(0);
    font-size:45px;
    font-weight:bold;
    color:white;
    text-shadow:0 0 30px red;
    transition:0.2s;
}

.impact.show{
    transform:translateX(-50%) scale(1.3);
}

/* FINAL */
.final{
    position:absolute;
    top:35%;
    width:100%;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:white;
    opacity:0;
    transform:scale(0.5);
    transition:0.6s;
}

.final.show{
    opacity:1;
    transform:scale(1.2);
}

</style>
</head>
<body>

<div class="scene">

<div class="counter" id="counter">HITS 0 / 7</div>

<div class="impact" id="impact">POW!</div>

<div class="final" id="final">LEVEL COMPLETE</div>

<div class="girl" id="girl">
    <div class="face">
        <div class="hair"></div>
        <div class="eye left-eye"></div>
        <div class="eye right-eye"></div>
        <div class="freckle f1"></div>
        <div class="freckle f2"></div>
        <div class="freckle f3"></div>
        <div class="freckle f4"></div>
        <div class="mouth"></div>
    </div>
</div>

<div class="hand" id="hand"></div>

<button class="btn" id="btn">TOKAT</button>

</div>

<script>
let count=0;

const btn=document.getElementById("btn");
const hand=document.getElementById("hand");
const girl=document.getElementById("girl");
const impact=document.getElementById("impact");
const counter=document.getElementById("counter");
const final=document.getElementById("final");

btn.addEventListener("click",()=>{

if(count>=7)return;

count++;
counter.innerText="HITS "+count+" / 7";

hand.style.right="-80px";
setTimeout(()=>hand.style.right="-220px",150);

girl.classList.add("shake");
impact.classList.add("show");

setTimeout(()=>{
girl.classList.remove("shake");
impact.classList.remove("show");
},300);

if(count===7){
setTimeout(()=>final.classList.add("show"),500);
}

});
</script>

</body>
</html>
