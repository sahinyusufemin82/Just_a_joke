<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Premium Cartoon Game</title>
<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at 30% 30%, #ffb6d5, #ff8fab, #c77dff);
    font-family: 'Segoe UI', sans-serif;
    overflow:hidden;
}

/* CAM EFEKTİ PANEL */
.scene{
    position:relative;
    width:430px;
    height:560px;
    backdrop-filter: blur(20px);
    background:rgba(255,255,255,0.1);
    border-radius:30px;
    box-shadow:0 25px 50px rgba(0,0,0,0.3);
    overflow:hidden;
}

/* COUNTER */
.counter{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:20px;
    letter-spacing:2px;
    text-shadow:0 0 10px black;
}

/* GIRL */
.girl{
    position:absolute;
    bottom:70px;
    left:50%;
    transform:translateX(-50%);
}

/* YÜZ */
.face{
    width:180px;
    height:210px;
    background:radial-gradient(circle at 50% 40%, #fff5ec 60%, #ffd8c2);
    border-radius:110px;
    position:relative;
    box-shadow:
        inset 0 -10px 20px rgba(0,0,0,0.1),
        0 20px 40px rgba(0,0,0,0.25);
    border:3px solid rgba(0,0,0,0.2);
}

/* SAÇ */
.hair{
    position:absolute;
    width:220px;
    height:160px;
    background:linear-gradient(180deg,#fff176,#ffb703,#fb8500);
    border-radius:140px 140px 60px 60px;
    top:-70px;
    left:-20px;
    z-index:-1;
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

/* GÖZ */
.eye{
    width:32px;
    height:32px;
    background:radial-gradient(circle at 30% 30%, #b08968, #6f4e37);
    border-radius:50%;
    position:absolute;
    top:85px;
    box-shadow: inset 0 5px 8px rgba(0,0,0,0.4);
}

.eye::after{
    content:"";
    width:10px;
    height:10px;
    background:white;
    border-radius:50%;
    position:absolute;
    top:5px;
    left:6px;
    opacity:0.9;
}

.left-eye{left:45px;}
.right-eye{right:45px;}

/* ÇİLLER */
.freckle{
    width:7px;
    height:7px;
    background:#d99a6c;
    border-radius:50%;
    position:absolute;
    opacity:0.8;
}
.f1{top:130px; left:60px;}
.f2{top:135px; left:75px;}
.f3{top:130px; right:60px;}
.f4{top:135px; right:75px;}

/* EL */
.hand{
    position:absolute;
    width:150px;
    height:100px;
    background:radial-gradient(circle at 40% 40%, #ffd6b3, #f4a261);
    border-radius:60px;
    right:-200px;
    top:200px;
    cursor:pointer;
    transition:0.12s ease;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* SHAKE */
@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-12px);}
    50%{transform:translateX(12px);}
    75%{transform:translateX(-8px);}
    100%{transform:translateX(0);}
}

.shake{
    animation:shake 0.3s;
}

/* FINAL */
.final{
    position:absolute;
    top:35%;
    width:100%;
    text-align:center;
    font-size:30px;
    font-weight:bold;
    color:white;
    opacity:0;
    transform:scale(0.5);
    transition:0.6s;
    text-shadow:0 0 25px #000;
}

.final.show{
    opacity:1;
    transform:scale(1.2);
}

/* BULAŞIK */
.items{
    position:absolute;
    bottom:-150px;
    width:100%;
    text-align:center;
    font-size:55px;
    transition:1s;
}

.items.show{
    bottom:30px;
}

</style>
</head>
<body>

<div class="scene" id="scene">

<div class="counter" id="counter">HITS 0 / 7</div>

<div class="final" id="final">
CLEAN MODE ACTIVATED 🧼
</div>

<div class="girl" id="girl">
    <div class="face">
        <div class="hair"></div>
        <div class="eye left-eye"></div>
        <div class="eye right-eye"></div>
        <div class="freckle f1"></div>
        <div class="freckle f2"></div>
        <div class="freckle f3"></div>
        <div class="freckle f4"></div>
    </div>
</div>

<div class="hand" id="hand"></div>

<div class="items" id="items">
🧽 🍽️ 🫧 🧼
</div>

</div>

<script>
let count=0;
const hand=document.getElementById("hand");
const girl=document.getElementById("girl");
const counter=document.getElementById("counter");
const final=document.getElementById("final");
const items=document.getElementById("items");

hand.addEventListener("click",()=>{

if(count>=7)return;

count++;
counter.innerText="HITS "+count+" / 7";

hand.style.right="-70px";
setTimeout(()=>hand.style.right="-200px",120);

girl.classList.add("shake");
setTimeout(()=>girl.classList.remove("shake"),300);

if(count===7){
    setTimeout(()=>{
        final.classList.add("show");
        items.classList.add("show");
    },500);
}

});
</script>

</body>
</html>
